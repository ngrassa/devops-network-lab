name: DevOps Network Lab CI/CD

on:
  push:
    branches: [ "master" ]
  workflow_dispatch:

env:
  AWS_REGION: us-east-1
  TF_VERSION: "1.5.7"

jobs:
  validate:
    name: Validate Configuration
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4

    - name: Check required files
      run: |
        for f in terraform/main.tf terraform/variables.tf terraform/outputs.tf docker-compose.yml ansible/playbook.yml scripts/test.sh; do
          test -f "$f" && echo "✓ $f found" || { echo "✗ $f NOT found"; exit 1; }
        done

  deploy:
    name: Deploy Infrastructure
    runs-on: ubuntu-latest
    needs: validate
    permissions:
      contents: read
      id-token: write

    steps:
    - uses: actions/checkout@v4

    - name: Configure AWS credentials
      uses: aws-actions/configure-aws-credentials@v4
      with:
        aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
        aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
        aws-session-token: ${{ secrets.AWS_SESSION_TOKEN }}
        aws-region: ${{ env.AWS_REGION }}

    - name: Verify AWS credentials
      run: |
        aws sts get-caller-identity
        echo "✓ AWS credentials verified"

    - name: Setup Terraform
      uses: hashicorp/setup-terraform@v3
      with:
        terraform_version: ${{ env.TF_VERSION }}

    - name: Terraform Init
      working-directory: terraform
      run: terraform init

    - name: Terraform Format
      working-directory: terraform
      run: terraform fmt -check -recursive || terraform fmt -recursive

    - name: Terraform Validate
      working-directory: terraform
      run: terraform validate

    - name: Terraform Plan
      working-directory: terraform
      run: terraform plan -out=tfplan -no-color

    - name: Terraform Apply
      working-directory: terraform
      run: terraform apply -auto-approve tfplan

    - name: Get EC2 Public IP
      id: ec2
      working-directory: terraform
      run: |
        PUBLIC_IP=$(terraform output -raw public_ip)
        echo "public_ip=$PUBLIC_IP" >> $GITHUB_OUTPUT
        echo "✓ EC2 Public IP: $PUBLIC_IP"

    - name: Wait for EC2 SSH to be ready
      run: |
        for i in {1..30}; do
          nc -z -w5 ${{ steps.ec2.outputs.public_ip }} 22 2>/dev/null && echo "✓ SSH ready" && break
          echo "⏳ $i/30..."; sleep 10
        done

    - name: Deploy application via SSH
      uses: appleboy/ssh-action@master
      with:
        host: ${{ steps.ec2.outputs.public_ip }}
        username: ubuntu
        key: ${{ secrets.EC2_SSH_PRIVATE_KEY }}
        script_stop: true
        timeout: 600s
        script: |
          set -e

          # ── 1. Paquets ────────────────────────────────────────────────
          sudo apt-get update -qq
          sudo apt-get install -y -qq docker.io docker-compose-v2 ansible git

          # ── 2. Nettoyage réseau AVANT de démarrer Docker ─────────────
          # Arrêt de Docker pour libérer toutes les interfaces kernel
          sudo systemctl stop docker docker.socket 2>/dev/null || true
          sleep 3

          # Suppression de toutes les interfaces bridge br-* du kernel
          for br in $(ip link show type bridge 2>/dev/null \
                      | awk -F': ' '/^[0-9]+:/{print $2}' \
                      | grep '^br-'); do
            sudo ip link set "$br" down   2>/dev/null || true
            sudo ip link delete "$br"     2>/dev/null || true
            echo "Supprimé: $br"
          done

          # ── 3. Redémarrage propre de Docker ──────────────────────────
          sudo systemctl start docker
          sudo systemctl enable docker
          sudo usermod -aG docker ubuntu
          sudo chmod 660 /var/run/docker.sock
          sudo chown root:docker /var/run/docker.sock

          # Attente daemon Docker
          for i in {1..20}; do
            sudo docker ps &>/dev/null && echo "✓ Docker ready" && break || sleep 2
          done

          # ── 4. Repo ───────────────────────────────────────────────────
          REPO_DIR=~/devops-lab
          if [ -d "$REPO_DIR/.git" ]; then
            cd "$REPO_DIR" && git pull origin master
          else
            git clone https://github.com/ngrassa/devops-network-lab.git "$REPO_DIR"
          fi

          # ── 5. Docker Compose (via sg pour activer le groupe docker) ──
          sg docker -c "
            set -e
            cd $REPO_DIR
            docker compose down --remove-orphans --volumes 2>/dev/null || true
            docker network prune -f
            docker compose up -d
            sleep 15
            docker compose ps
          "

          # ── 6. Ansible + tests ────────────────────────────────────────
          cd "$REPO_DIR"
          ansible-playbook ansible/playbook.yml
          bash scripts/test.sh

          echo "✅ Deployment completed!"

    - name: Deployment Summary
      if: always()
      run: |
        echo "EC2 IP : ${{ steps.ec2.outputs.public_ip }}"
        echo "Region : ${{ env.AWS_REGION }}"
        echo "SSH    : ssh -i your-key.pem ubuntu@${{ steps.ec2.outputs.public_ip }}"
