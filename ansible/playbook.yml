---
- name: Configure network routing
  hosts: localhost
  gather_facts: false
  become: true
  tasks:
    - name: Enable IP forwarding on router
      command: docker exec router sysctl -w net.ipv4.ip_forward=1
      changed_when: true

    - name: Set iptables FORWARD policy to ACCEPT
      command: docker exec router iptables -P FORWARD ACCEPT
      changed_when: true

    - name: Enable NAT masquerade
      command: docker exec router iptables -t nat -A POSTROUTING -j MASQUERADE
      changed_when: true

    - name: Get router IP on vlan10
      command: docker exec router hostname -I
      register: router_ips
      changed_when: false

    - name: Show router IPs
      debug:
        msg: "Router IPs: {{ router_ips.stdout }}"

    - name: Get pc1 default gateway
      command: docker exec pc1 ip route show default
      register: pc1_gw
      changed_when: false

    - name: Get pc3 default gateway
      command: docker exec pc3 ip route show default
      register: pc3_gw
      changed_when: false

    - name: Show routing info
      debug:
        msg:
          - "PC1 gateway: {{ pc1_gw.stdout }}"
          - "PC3 gateway: {{ pc3_gw.stdout }}"
