---
- name: Configure network routing
  hosts: localhost
  gather_facts: false
  become: true
  tasks:
    - name: Enable IP forwarding on router
      command: docker exec router sysctl -w net.ipv4.ip_forward=1
      changed_when: true

    - name: Set iptables FORWARD policy to ACCEPT
      command: docker exec router iptables -P FORWARD ACCEPT
      changed_when: true

    - name: Enable NAT masquerade
      command: docker exec router iptables -t nat -A POSTROUTING -j MASQUERADE
      changed_when: true

    - name: Get router IP on vlan10
      shell: >
        docker inspect router
        | python3 -c "import sys,json; print(json.load(sys.stdin)[0]['NetworkSettings']['Networks']['devops-lab_vlan10']['IPAddress'])"
      register: router_vlan10
      changed_when: false

    - name: Get router IP on vlan20
      shell: >
        docker inspect router
        | python3 -c "import sys,json; print(json.load(sys.stdin)[0]['NetworkSettings']['Networks']['devops-lab_vlan20']['IPAddress'])"
      register: router_vlan20
      changed_when: false

    - name: Get vlan10 subnet
      shell: >
        docker network inspect devops-lab_vlan10
        | python3 -c "import sys,json; print(json.load(sys.stdin)[0]['IPAM']['Config'][0]['Subnet'])"
      register: vlan10_subnet
      changed_when: false

    - name: Get vlan20 subnet
      shell: >
        docker network inspect devops-lab_vlan20
        | python3 -c "import sys,json; print(json.load(sys.stdin)[0]['IPAM']['Config'][0]['Subnet'])"
      register: vlan20_subnet
      changed_when: false

    - name: Show detected network info
      debug:
        msg:
          - "Router on VLAN10: {{ router_vlan10.stdout }}"
          - "Router on VLAN20: {{ router_vlan20.stdout }}"
          - "VLAN10 subnet: {{ vlan10_subnet.stdout }}"
          - "VLAN20 subnet: {{ vlan20_subnet.stdout }}"

    - name: Add route on pc1 to reach VLAN 20 via router
      command: "docker exec pc1 ip route add {{ vlan20_subnet.stdout }} via {{ router_vlan10.stdout }}"
      register: route_pc1
      failed_when: route_pc1.rc != 0 and 'File exists' not in route_pc1.stderr
      changed_when: route_pc1.rc == 0

    - name: Add route on pc2 to reach VLAN 20 via router
      command: "docker exec pc2 ip route add {{ vlan20_subnet.stdout }} via {{ router_vlan10.stdout }}"
      register: route_pc2
      failed_when: route_pc2.rc != 0 and 'File exists' not in route_pc2.stderr
      changed_when: route_pc2.rc == 0

    - name: Add route on pc3 to reach VLAN 10 via router
      command: "docker exec pc3 ip route add {{ vlan10_subnet.stdout }} via {{ router_vlan20.stdout }}"
      register: route_pc3
      failed_when: route_pc3.rc != 0 and 'File exists' not in route_pc3.stderr
      changed_when: route_pc3.rc == 0

    - name: Get pc1 routes
      command: docker exec pc1 ip route show
      register: pc1_routes
      changed_when: false

    - name: Get pc3 routes
      command: docker exec pc3 ip route show
      register: pc3_routes
      changed_when: false

    - name: Show routing info
      debug:
        msg:
          - "PC1 routes: {{ pc1_routes.stdout }}"
          - "PC3 routes: {{ pc3_routes.stdout }}"
